<!DOCTYPE html>
<html lang="fr">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FS9YCCEDT9"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-FS9YCCEDT9');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Mémorial Assil Hamdi</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Roboto:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        /* --- PALETTE DE COULEURS HARMONISÉE : BRUN ET OR PREMIUM --- */
        :root {
            --primary-bg: #FFFFFF; 
            --secondary-bg: #F4F1EA; /* Beige très clair doux */
            --accent-dark: #3E2723; /* Brun profond signature */
            --accent-medium: #5D4037; /* Brun moyen */
            --accent-gold: #D4AF37; /* Or métallique précieux */
            --text-dark: #2A211F; 
            --text-light: #756865; 
            --border-color: #E6E1DA; 
            --shadow-subtle: rgba(62, 39, 35, 0.05) 0px 4px 20px 0px;
            --shadow-deep: rgba(62, 39, 35, 0.12) 0px 12px 30px 0px;
        }

        /* Global Styles */
        body {
            font-family: 'Roboto', 'Cairo', sans-serif;
            background: var(--primary-bg);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            line-height: 1.7;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* شريط الترحم العلوي */
        .top-memorial-ribbon {
            background-color: var(--accent-dark);
            color: #FFFFFF;
            padding: 12px 30px;
            text-align: center;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            border-bottom: 2px solid var(--accent-gold);
            letter-spacing: 0.5px;
            direction: rtl;
            width: 100%;
            box-sizing: border-box;
        }
        
        .top-memorial-ribbon span {
            color: var(--accent-gold);
            font-weight: 700;
        }

        /* Main Title Header */
        .header-title {
            font-family: 'Playfair Display', serif;
            text-align: center;
            padding: 40px 20px;
            font-size: 3.2em;
            font-weight: 700;
            color: var(--accent-dark);
            letter-spacing: 0.05em;
            background: var(--secondary-bg);
            border-bottom: 3px solid var(--accent-gold);
        }

        /* Container Section */
        #form-container {
            max-width: 700px;
            width: 90%;
            margin: 40px auto;
            padding: 40px;
            background: var(--primary-bg);
            border-radius: 12px;
            box-shadow: var(--shadow-subtle);
            border: 1px solid var(--border-color);
            box-sizing: border-box;
            flex-grow: 1;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .formgroup {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 1.1em;
            font-weight: 500;
            color: var(--accent-dark);
            padding-left: 5px;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;    
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            padding: 12px 15px;
            font-family: 'Roboto', sans-serif;
            font-size: 1em;
            color: var(--text-dark);
            background-color: var(--primary-bg);
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.2);
            background-color: var(--table-row-hover);
        }

        textarea {
            height: 150px;    
            resize: vertical; 
        }

        /* Submit Button Styled as standard premium button */
        input[type="submit"] {
            display: block;
            margin: 15px auto 0 auto;
            width: 100%;
            max-width: 350px;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: 700;
            color: #FFFFFF;
            background: var(--accent-dark);
            border: 2px solid var(--accent-dark);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-deep);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        input[type="submit"]:hover {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            color: var(--accent-dark);
            transform: translateY(-2px);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 25px 20px;
            background-color: var(--secondary-bg);
            color: var(--text-light);
            border-top: 1px solid var(--border-color);
            font-size: 0.95em;
            margin-top: auto;
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .header-title {
                font-size: 2.2em;
                padding: 30px 15px;
            }
            #form-container {
                margin: 20px auto;
                padding: 25px;
            }
            input[type="submit"] {
                font-size: 1.1em;
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="top-memorial-ribbon">
        تخليداً لذكرى الفقيدة الغالية <span>...أسيل الله يرحمك</span>، كتخليد لها و لذكراها العطرة في قلوبنا وعقولنا.
    </div>

    <div class="header-title">Contact Us</div>
    
    <div id="form-container">
        <form id="waterform" action="mailto:matholympiad40@gmail.com" method="post" enctype="text/plain">
            <div class="formgroup" id="name-form">
                <label for="name">Your name*</label>
                <input type="text" id="name" name="name" required />
            </div>
            
            <div class="formgroup" id="email-form">
                <label for="email">Your e-mail*</label>
                <input type="email" id="email" name="email" required />
            </div>
            
            <div class="formgroup" id="message-form">
                <label for="message">Your message</label>
                <textarea id="message" name="message" placeholder="Write your message here..."></textarea>
            </div>
            
            <input type="submit" value="Send your message!" />
        </form>
    </div>

    <footer>
        <p>&copy; 2026 Math Olympiad. All rights reserved.</p>
    </footer>

</body>
</html>
