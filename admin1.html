<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Nexus Labs - Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Styles Globaux */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff; /* FOND BLANC DEMANDÉ */
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Carte de profil */
        .profile-card {
            width: 100%;
            max-width: 450px;
            background: #ffffff;
            border: 1px solid #f0f0f0;
            border-radius: 40px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            text-align: center;
            padding-bottom: 40px;
        }

        /* Zone d'en-tête (Dégradé bleu pour l'aspect Quantum) */
        .header-top {
            background: linear-gradient(180deg, #00d4ff 0%, #ffffff 100%);
            height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .profile-avatar {
            width: 110px;
            height: 110px;
            background: #ffffff;
            border-radius: 50%;
            border: 5px solid #ffffff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }

        .admin-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            color: #000000;
            letter-spacing: -1px;
        }

        /* Contenu principal */
        .content {
            padding: 20px 40px;
        }

        .welcome-msg {
            font-size: 1rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .welcome-msg strong {
            color: #000;
            font-weight: 600;
        }

        /* Grille d'informations */
        .info-grid {
            background: #fcfcfc;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #f5f5f5;
        }

        .info-line {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            text-align: left;
        }

        .info-line:last-child { margin-bottom: 0; }

        .icon {
            font-size: 1.4rem;
            margin-right: 15px;
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .label {
            display: block;
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
            font-weight: 700;
        }

        .value {
            font-weight: 600;
            color: #000;
        }

        /* Bouton Noir (votre couleur préférée pour le confort visuel) */
        .btn-send {
            display: block;
            background: #000000;
            color: #ffffff;
            padding: 18px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .btn-send:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            background: #222;
        }

        /* Selecteur de rapport */
        .report-box {
            margin-top: 25px;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 12px;
            background: #fff;
            color: #888;
            outline: none;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <div class="profile-card">
        <div class="header-top">
            <div class="profile-avatar">
                <svg viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="1.5" style="padding: 20px;">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <h1 class="admin-title">Admin</h1>
        </div>

        <div class="content">
            <p class="welcome-msg">
                Welcome to the <strong>Quantum Nexus Labs</strong><br>
                admin profile: Med Rayen Bouazizi
            </p>

            <div class="info-grid">
                <div class="info-line">
                    <span class="icon">🏠</span>
                    <div>
                        <span class="label">Current City</span>
                        <span class="value">Sidi Bouzid, Tunisia</span>
                    </div>
                </div>
                <div class="info-line">
                    <span class="icon">🎓</span>
                    <div>
                        <span class="label">School</span>
                        <span class="value">Lycée Pilote Sidi Bouzid</span>
                    </div>
                </div>
            </div>

            <a href="#" class="btn-send">SEND A MESSAGE TO ADMIN</a>

            <div class="report-box">
                <p style="font-size: 0.8rem; color: #bbb; margin-bottom: 8px;">Report an Issue</p>
                <select>
                    <option disabled selected>Select a reason to report...</option>
                    <option>Technical issue</option>
                    <option>Information error</option>
                </select>
            </div>
        </div>
    </div>

</body>
</html>
